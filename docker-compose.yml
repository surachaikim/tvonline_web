version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      # Persist channel click data on host
      - ./channel_clicks.json:/app/channel_clicks.json
    environment:
      # Pass through environment variables from host or .env file
      - FLASK_ENV=production
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - SITE_NAME=${SITE_NAME:-TVHUB.ONLINE}
      - BASE_URL=${BASE_URL:-https://tvhub.online}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: unless-stopped
