<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ดูดวงรายสัปดาห์ {{ thai_sign }} | TVHUB.ONLINE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/horoscope.css') }}">
</head>

<body class="horoscope-page">
  {% include 'includes/header.html' %}

  <main>
    <div class="container horo-shell">
      <section class="horo-hero">
        <span class="horo-kicker"><i class="bi bi-moon-stars-fill"></i> Weekly Forecast</span>
        <h1 class="horo-title">{{ thai_sign }}</h1>
        <p class="horo-lead mb-0">ดูแนวโน้ม 7 วัน แยกการงาน การเงิน และความรัก พร้อมสรุปภาพรวมประจำสัปดาห์</p>
        <div class="horo-actions">
          <a class="horo-btn" href="{{ url_for('horoscope_list') }}">
            <i class="bi bi-arrow-left-circle"></i> กลับหน้าดูดวง
          </a>
          <button id="share-copy" class="horo-btn" type="button" onclick="copyShareLink()">
            <i class="bi bi-link-45deg"></i> คัดลอกลิงก์
          </button>
        </div>
        <div class="small text-white-50 mt-3" id="today-label"></div>
      </section>

      <section class="horo-section">
        <div class="horo-panel" id="horoscope-root" data-sign="{{ sign }}" data-days='{{ days_of_week | tojson | e }}'>
          <div id="loading-state" class="horo-loading">
            <div class="horo-spinner" aria-hidden="true"></div>
            <div class="fw-bold">กำลังจัดคำทำนาย</div>
            <div class="horo-muted small">โปรดรอสักครู่</div>
          </div>

          <div id="error-state" class="alert alert-danger d-none" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span id="error-text">ไม่สามารถโหลดคำทำนายได้</span>
          </div>

          <div id="content-state" class="d-none">
            <div class="row g-3 mb-4" id="insight-row"></div>
            <ul class="nav nav-pills horo-tabs justify-content-center mb-4" id="day-tab" role="tablist"></ul>
            <div class="tab-content" id="day-tab-content"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

  {% include 'includes/footer.html' %}
  <script>
    (function () {
      const root = document.getElementById('horoscope-root');
      const sign = root?.dataset?.sign || '';
      let daysOfWeek = {};
      try { daysOfWeek = JSON.parse(root?.dataset?.days || '{}'); } catch (_) { daysOfWeek = {}; }

      const now = new Date();
      const todayStr = now.toLocaleDateString('th-TH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      document.getElementById('today-label').textContent = `วันนี้: ${todayStr}`;
      const indexToKey = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
      const dayKeyToday = indexToKey[now.getDay()];

      const loadingEl = document.getElementById('loading-state');
      const errorEl = document.getElementById('error-state');
      const errorText = document.getElementById('error-text');
      const contentEl = document.getElementById('content-state');
      const insightEl = document.getElementById('insight-row');
      const tabsEl = document.getElementById('day-tab');
      const tabContentEl = document.getElementById('day-tab-content');

      function show(el) { el.classList.remove('d-none'); }
      function hide(el) { el.classList.add('d-none'); }
      function escapeHtml(value) {
        return String(value || '').replace(/[&<>"']/g, (char) => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[char]));
      }

      function predictionCard(cls, icon, title, text) {
        return `
          <div class="col-lg-4">
            <div class="horo-prediction ${cls}">
              <div class="d-flex align-items-start gap-3">
                <i class="bi ${icon} fs-3"></i>
                <div>
                  <h5>${title}</h5>
                  <p class="mb-0">${escapeHtml(text || '-')}</p>
                </div>
              </div>
            </div>
          </div>`;
      }

      function render(data) {
        tabsEl.innerHTML = '';
        tabContentEl.innerHTML = '';
        const lucky = data.lucky || {};
        const overview = data.overview || 'สัปดาห์นี้เหมาะกับการจัดลำดับความสำคัญและค่อย ๆ เดินหน้าทีละเรื่อง';
        const advice = data.advice || 'เลือกทำเรื่องสำคัญก่อน แล้วเรื่องเล็กจะเบาขึ้นเอง';

        insightEl.innerHTML = `
          <div class="col-lg-7">
            <div class="horo-card">
              <div class="horo-card-body">
                <div class="horo-muted small mb-1">ภาพรวมประจำสัปดาห์</div>
                <h2 class="h4 fw-bold mb-2">พลังของ {{ thai_sign }}</h2>
                <p class="mb-0">${escapeHtml(overview)}</p>
              </div>
            </div>
          </div>
          <div class="col-lg-5">
            <div class="horo-card">
              <div class="horo-card-body">
                <div class="horo-muted small mb-2">เสริมดวง</div>
                <span class="horo-pill"><i class="bi bi-palette-fill"></i>${escapeHtml(lucky.color || 'แดงเข้ม')}</span>
                <span class="horo-pill"><i class="bi bi-123"></i>${escapeHtml(lucky.number || '9')}</span>
                <span class="horo-pill"><i class="bi bi-stars"></i>${escapeHtml(lucky.keyword || 'ตั้งหลัก')}</span>
                <p class="mb-0 mt-2 small horo-muted">${escapeHtml(advice)}</p>
              </div>
            </div>
          </div>`;

        ['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday', 'sunday'].forEach((dayKey) => {
          const isActive = dayKey === dayKeyToday;
          const dayLabel = daysOfWeek[dayKey] || dayKey;
          const pred = data[dayKey] || {};

          const li = document.createElement('li');
          li.className = 'nav-item';
          li.role = 'presentation';
          li.innerHTML = `
            <button class="nav-link ${isActive ? 'active' : ''}" id="${dayKey}-tab" data-bs-toggle="tab"
              data-bs-target="#${dayKey}-content" type="button" role="tab"
              aria-controls="${dayKey}-content" aria-selected="${isActive ? 'true' : 'false'}">${dayLabel}</button>`;
          tabsEl.appendChild(li);

          const pane = document.createElement('div');
          pane.className = `tab-pane fade ${isActive ? 'show active' : ''}`;
          pane.id = `${dayKey}-content`;
          pane.role = 'tabpanel';
          pane.setAttribute('aria-labelledby', `${dayKey}-tab`);
          pane.innerHTML = `
            <div class="row g-3">
              ${predictionCard('work', 'bi-briefcase-fill', 'การงาน', pred.work)}
              ${predictionCard('finance', 'bi-cash-coin', 'การเงิน', pred.finance)}
              ${predictionCard('love', 'bi-heart-fill', 'ความรัก', pred.love)}
            </div>`;
          tabContentEl.appendChild(pane);
        });
      }

      async function load() {
        try {
          const res = await fetch(`/api/horoscope/${encodeURIComponent(sign)}`);
          const data = await res.json();
          if (!res.ok || data.error) throw new Error(data.error || 'เกิดข้อผิดพลาด');
          render(data);
          hide(loadingEl);
          hide(errorEl);
          show(contentEl);
        } catch (err) {
          hide(loadingEl);
          errorText.textContent = err.message || 'ไม่สามารถโหลดคำทำนายได้';
          show(errorEl);
        }
      }

      load();
    })();

    function copyShareLink() {
      navigator.clipboard.writeText(window.location.href).then(function () {
        const btn = document.getElementById('share-copy');
        btn.innerHTML = '<i class="bi bi-check-lg"></i> คัดลอกแล้ว';
        setTimeout(function () {
          btn.innerHTML = '<i class="bi bi-link-45deg"></i> คัดลอกลิงก์';
        }, 1800);
      });
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
