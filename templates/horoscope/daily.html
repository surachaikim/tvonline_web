<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ดวงรายวัน | TVHUB.ONLINE</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/horoscope.css') }}">
</head>

<body class="horoscope-page">
  {% include 'includes/header.html' %}

  <main>
    <div class="container horo-shell">
      <section class="horo-hero">
        <span class="horo-kicker"><i class="bi bi-sunrise-fill"></i> Daily Forecast</span>
        <h1 class="horo-title">ดวงรายวัน</h1>
        <p class="horo-lead mb-0">ดูแนวโน้มประจำสัปดาห์แบบรวมทุกคน พร้อมแยกการงาน การเงิน และความรักในแต่ละวัน</p>
        <div class="horo-actions">
          <a class="horo-btn" href="{{ url_for('horoscope_list') }}">
            <i class="bi bi-arrow-left-circle"></i> กลับหน้าดูดวง
          </a>
          <a class="horo-btn primary" href="{{ url_for('horoscope_birth_page') }}">
            <i class="bi bi-calendar-heart"></i> ดูตามวันเกิด
          </a>
        </div>
        <div class="small text-white-50 mt-3" id="today-label"></div>
      </section>

      <section class="horo-section">
        <div class="horo-panel" id="daily-root">
          <div id="loading" class="horo-loading">
            <div class="horo-spinner" aria-hidden="true"></div>
            <div class="fw-bold">กำลังจัดคำทำนาย</div>
            <div class="horo-muted small">โปรดรอสักครู่</div>
          </div>

          <div id="error" class="alert alert-danger d-none" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span id="error-text">ไม่สามารถโหลดคำทำนายได้</span>
          </div>

          <div id="content" class="d-none">
            <div class="row g-3 mb-4" id="insight-row"></div>
            <ul class="nav nav-pills horo-tabs justify-content-center mb-4" id="day-tab" role="tablist"></ul>
            <div class="tab-content" id="day-tab-content"></div>
          </div>
        </div>
      </section>
    </div>
  </main>

  {% include 'includes/footer.html' %}

  <script>
    (async function () {
      const loading = document.getElementById('loading');
      const error = document.getElementById('error');
      const errorText = document.getElementById('error-text');
      const content = document.getElementById('content');
      const tabsEl = document.getElementById('day-tab');
      const tabContentEl = document.getElementById('day-tab-content');
      const insightEl = document.getElementById('insight-row');

      const now = new Date();
      const todayStr = now.toLocaleDateString('th-TH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      document.getElementById('today-label').textContent = `วันนี้: ${todayStr}`;
      const indexToKey = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
      const dayKeyToday = indexToKey[now.getDay()];

      function show(el) { el.classList.remove('d-none'); }
      function hide(el) { el.classList.add('d-none'); }
      function escapeHtml(value) {
        return String(value || '').replace(/[&<>"']/g, (char) => ({
          '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[char]));
      }

      function render(weekly) {
        const daysOfWeek = {
          monday: 'วันจันทร์',
          tuesday: 'วันอังคาร',
          wednesday: 'วันพุธ',
          thursday: 'วันพฤหัสบดี',
          friday: 'วันศุกร์',
          saturday: 'วันเสาร์',
          sunday: 'วันอาทิตย์'
        };
        const order = ['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday', 'sunday'];
        const lucky = weekly.lucky || {};

        tabsEl.innerHTML = '';
        tabContentEl.innerHTML = '';
        insightEl.innerHTML = `
          <div class="col-lg-7">
            <div class="horo-card">
              <div class="horo-card-body">
                <div class="horo-muted small mb-1">ภาพรวมสัปดาห์นี้</div>
                <h2 class="h4 fw-bold mb-2">จังหวะที่ควรรู้ก่อนเริ่มวัน</h2>
                <p class="mb-0">${escapeHtml(weekly.overview || 'สัปดาห์นี้เหมาะกับการวางแผนให้ชัด เลือกใช้พลังกับเรื่องที่สำคัญจริง ๆ')}</p>
              </div>
            </div>
          </div>
          <div class="col-lg-5">
            <div class="horo-card">
              <div class="horo-card-body">
                <div class="horo-muted small mb-2">เสริมดวง</div>
                <span class="horo-pill"><i class="bi bi-palette-fill"></i>${escapeHtml(lucky.color || 'แดงเข้ม')}</span>
                <span class="horo-pill"><i class="bi bi-123"></i>${escapeHtml(lucky.number || '8')}</span>
                <span class="horo-pill"><i class="bi bi-stars"></i>${escapeHtml(lucky.keyword || 'ใจนิ่ง')}</span>
                <p class="mb-0 mt-2 small horo-muted">${escapeHtml(weekly.advice || 'ทำทีละเรื่องให้จบ แล้วผลลัพธ์จะค่อย ๆ ชัดขึ้น')}</p>
              </div>
            </div>
          </div>`;

        order.forEach((key) => {
          const isActive = key === dayKeyToday;
          const pred = weekly[key] || {};
          const li = document.createElement('li');
          li.className = 'nav-item';
          li.innerHTML = `<button class="nav-link ${isActive ? 'active' : ''}" id="${key}-tab" data-bs-toggle="tab" data-bs-target="#${key}-content" type="button" role="tab" aria-controls="${key}-content" aria-selected="${isActive ? 'true' : 'false'}">${daysOfWeek[key]}</button>`;
          tabsEl.appendChild(li);

          const pane = document.createElement('div');
          pane.className = `tab-pane fade ${isActive ? 'show active' : ''}`;
          pane.id = `${key}-content`;
          pane.role = 'tabpanel';
          pane.setAttribute('aria-labelledby', `${key}-tab`);
          pane.innerHTML = `
            <div class="row g-3">
              <div class="col-lg-4"><div class="horo-prediction work"><i class="bi bi-briefcase-fill fs-3"></i><h5 class="mt-2">การงาน</h5><p class="mb-0">${escapeHtml(pred.work || '-')}</p></div></div>
              <div class="col-lg-4"><div class="horo-prediction finance"><i class="bi bi-cash-coin fs-3"></i><h5 class="mt-2">การเงิน</h5><p class="mb-0">${escapeHtml(pred.finance || '-')}</p></div></div>
              <div class="col-lg-4"><div class="horo-prediction love"><i class="bi bi-heart-fill fs-3"></i><h5 class="mt-2">ความรัก</h5><p class="mb-0">${escapeHtml(pred.love || '-')}</p></div></div>
            </div>`;
          tabContentEl.appendChild(pane);
        });
      }

      try {
        const res = await fetch('/api/horoscope/weekly');
        const data = await res.json();
        if (!res.ok || data.error) throw new Error(data.error || 'เกิดข้อผิดพลาด');
        render(data);
        hide(loading);
        show(content);
      } catch (e) {
        hide(loading);
        errorText.textContent = e.message || 'ไม่สามารถโหลดคำทำนายได้';
        show(error);
      }
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
