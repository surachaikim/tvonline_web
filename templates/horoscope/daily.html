<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ดวงรายวัน - TVHUB.ONLINE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --brand-red: #b71c1c;
            --surface: #1b1b1b;
            --line: #2a2a2a;
            --muted: #b0b0b0;
        }

        html,
        body {
            height: 100%;
        }

        body {
            background: #111;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .hero-section {
            background:
                radial-gradient(circle at 22% 20%, rgba(255, 255, 255, .12), transparent 18rem),
                linear-gradient(135deg, #000 55%, var(--brand-red) 100%);
            color: #fff;
            padding: 3rem 0;
            text-align: center;
            border-bottom-left-radius: 2rem;
            border-bottom-right-radius: 2rem;
        }

        .prediction-card {
            background: #1b1b1b;
            border: 1px solid #2a2a2a;
            border-left: 5px solid var(--brand-red);
            color: #ddd;
            border-radius: .75rem;
            padding: 1.25rem;
        }

        .insight-card {
            background: #1b1b1b;
            border: 1px solid #2a2a2a;
            border-radius: .9rem;
            padding: 1.25rem;
        }

        .lucky-chip {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 8px 12px;
            border-radius: 999px;
            background: rgba(183, 28, 28, .14);
            border: 1px solid rgba(183, 28, 28, .35);
            color: #ffd5d5;
            font-weight: 700;
            margin: 0 6px 8px 0;
        }

        .text-muted {
            color: #b0b0b0 !important;
        }

        .text-brand {
            color: var(--brand-red) !important;
        }

        /* Sticky footer */
        footer {
            margin-top: auto !important;
        }

        /* Make main content take remaining height */
        main#page-main {
            flex: 1 0 auto;
            display: block;
        }
    </style>
</head>

<body>
    {% include 'includes/header.html' %}

    <main id="page-main">
        <div class="hero-section mb-4">
            <div class="container">
                <h1 class="fw-bold">ดวงรายวัน</h1>
                <p class="text-white-50 mb-0">คำทำนายการงาน การเงิน และความรัก จันทร์ - อาทิตย์</p>
                <div class="small text-white-50 mt-2" id="today-label"></div>
                <div class="mt-3">
                    <span class="text-white-50 small me-2">แชร์ดวง:</span>
                    <a id="share-fb" href="#" class="btn btn-sm btn-primary me-1" target="_blank" title="แชร์ Facebook">
                        <i class="bi bi-facebook"></i>
                    </a>
                    <a id="share-line" href="#" class="btn btn-sm btn-success me-1" target="_blank" title="แชร์ LINE">
                        <i class="bi bi-line"></i> LINE
                    </a>
                    <a id="share-x" href="#" class="btn btn-sm btn-dark me-1" target="_blank" title="แชร์ X">
                        <i class="bi bi-twitter-x"></i>
                    </a>
                    <button id="share-copy" class="btn btn-sm btn-outline-light" onclick="copyShareLink()"
                        title="คัดลอกลิงก์">
                        <i class="bi bi-clipboard"></i>
                    </button>
                </div>
            </div>
        </div>

        <div class="container" id="daily-root">
            <!-- Loading -->
            <div id="loading" class="text-center my-4">
                <div class="spinner-border text-brand mb-3" role="status"></div>
                <div class="fw-semibold">กำลังทำนายผล ตั้งจิตอธิษฐาน…</div>
                <div class="text-muted small">โปรดรอสักครู่ ระบบกำลังขอคำทำนายจาก AI</div>
            </div>

            <!-- Error -->
            <div id="error" class="alert alert-danger d-none" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span id="error-text">ไม่สามารถโหลดคำทำนายได้</span>
            </div>

            <!-- Content: Tabs Mon-Sun -->
            <div id="content" class="d-none">
                <div class="row g-3 mb-4" id="insight-row"></div>
                <ul class="nav nav-pills justify-content-center mb-4" id="day-tab" role="tablist"></ul>
                <div class="tab-content" id="day-tab-content"></div>
            </div>
        </div>
    </main>

    {% include 'includes/footer.html' %}

    <script>
        (async function () {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const errorText = document.getElementById('error-text');
            const content = document.getElementById('content');

            // Today label
            const now = new Date();
            const todayStr = now.toLocaleDateString('th-TH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            const todayLabel = document.getElementById('today-label');
            if (todayLabel) todayLabel.textContent = `วันนี้: ${todayStr}`;

            const tabsEl = document.getElementById('day-tab');
            const tabContentEl = document.getElementById('day-tab-content');
            const insightEl = document.getElementById('insight-row');
            const indexToKey = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
            const dayKeyToday = indexToKey[now.getDay()];

            function escapeHtml(value) {
                return String(value || '').replace(/[&<>"']/g, (char) => ({
                    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
                }[char]));
            }

            function render(weekly) {
                const daysOfWeek = { monday: 'วันจันทร์', tuesday: 'วันอังคาร', wednesday: 'วันพุธ', thursday: 'วันพฤหัสบดี', friday: 'วันศุกร์', saturday: 'วันเสาร์', sunday: 'วันอาทิตย์' };
                const order = ['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday', 'sunday'];
                tabsEl.innerHTML = '';
                tabContentEl.innerHTML = '';
                insightEl.innerHTML = '';

                const lucky = weekly.lucky || {};
                insightEl.innerHTML = `
                    <div class="col-lg-7">
                        <div class="insight-card">
                            <div class="text-muted small mb-1">ภาพรวมสัปดาห์นี้</div>
                            <h4 class="fw-bold mb-2">จังหวะที่ควรรู้ก่อนเริ่มวัน</h4>
                            <p class="mb-0">${escapeHtml(weekly.overview || 'สัปดาห์นี้เหมาะกับการตั้งหลัก วางแผน และเลือกใช้พลังกับเรื่องที่สำคัญจริง ๆ')}</p>
                        </div>
                    </div>
                    <div class="col-lg-5">
                        <div class="insight-card">
                            <div class="text-muted small mb-2">เสริมดวง</div>
                            <span class="lucky-chip"><i class="bi bi-palette-fill"></i>${escapeHtml(lucky.color || 'แดงเข้ม')}</span>
                            <span class="lucky-chip"><i class="bi bi-123"></i>${escapeHtml(lucky.number || '8')}</span>
                            <span class="lucky-chip"><i class="bi bi-stars"></i>${escapeHtml(lucky.keyword || 'ใจนิ่ง')}</span>
                            <p class="mb-0 mt-2 small text-muted">${escapeHtml(weekly.advice || 'ทำทีละเรื่องให้จบ แล้วผลลัพธ์จะค่อย ๆ ชัดขึ้น')}</p>
                        </div>
                    </div>`;

                order.forEach((key) => {
                    const isActive = key === dayKeyToday;
                    const li = document.createElement('li');
                    li.className = 'nav-item';
                    li.innerHTML = `<button class="nav-link ${isActive ? 'active' : ''}" id="${key}-tab" data-bs-toggle="tab" data-bs-target="#${key}-content" type="button" role="tab" aria-controls="${key}-content" aria-selected="${isActive ? 'true' : 'false'}">${daysOfWeek[key]}</button>`;
                    tabsEl.appendChild(li);

                    const pane = document.createElement('div');
                    pane.className = `tab-pane fade ${isActive ? 'show active' : ''}`;
                    pane.id = `${key}-content`;
                    pane.role = 'tabpanel';
                    pane.setAttribute('aria-labelledby', `${key}-tab`);

                    const pred = weekly[key] || {};
                    pane.innerHTML = `
                            <div class="row g-3 justify-content-center">
                                <div class="col-lg-4">
                                    <div class="prediction-card h-100">
                                        <div class="d-flex align-items-start">
                                            <i class="bi bi-briefcase-fill text-info fs-3 me-3"></i>
                                            <div>
                                                <h5 class="text-white mb-2">การงาน</h5>
                                                <p class="mb-0">${escapeHtml(pred.work || '-')}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-lg-4">
                                    <div class="prediction-card h-100">
                                        <div class="d-flex align-items-start">
                                            <i class="bi bi-cash-coin text-success fs-3 me-3"></i>
                                            <div>
                                                <h5 class="text-white mb-2">การเงิน</h5>
                                                <p class="mb-0">${escapeHtml(pred.finance || '-')}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="col-lg-4">
                                    <div class="prediction-card h-100">
                                        <div class="d-flex align-items-start">
                                            <i class="bi bi-heart-fill text-brand fs-3 me-3"></i>
                                            <div>
                                                <h5 class="text-white mb-2">ความรัก</h5>
                                                <p class="mb-0">${escapeHtml(pred.love || '-')}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>`;

                    tabContentEl.appendChild(pane);
                });
            }

            function show(el) { el.classList.remove('d-none'); }
            function hide(el) { el.classList.add('d-none'); }

            try {
                const res = await fetch('/api/horoscope/weekly');
                const data = await res.json();
                if (!res.ok || data.error) throw new Error(data.error || 'เกิดข้อผิดพลาด');
                render(data);
                hide(loading);
                show(content);
            } catch (e) {
                hide(loading);
                errorText.textContent = e.message || 'ไม่สามารถโหลดคำทำนายได้';
                show(error);
            }
        })();

        // Share setup
        (function () {
            var u = encodeURIComponent(window.location.href);
            var t = encodeURIComponent('ดวงรายวัน วันนี้ ที่ TVHUB.ONLINE 🔮✨');
            document.getElementById('share-fb').href = 'https://www.facebook.com/sharer/sharer.php?u=' + u;
            document.getElementById('share-line').href = 'https://social-plugins.line.me/lineit/share?url=' + u + '&text=' + t;
            document.getElementById('share-x').href = 'https://twitter.com/intent/tweet?url=' + u + '&text=' + t;
        })();

        function copyShareLink() {
            navigator.clipboard.writeText(window.location.href).then(function () {
                var btn = document.getElementById('share-copy');
                btn.innerHTML = '<i class="bi bi-check-lg"></i> คัดลอกแล้ว';
                setTimeout(function () { btn.innerHTML = '<i class="bi bi-clipboard"></i>'; }, 2000);
            });
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
