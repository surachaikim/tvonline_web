<!-- AI Chat Widget -->
<div id="ai-chat-widget">
    <!-- Toggle Button -->
    <button id="ai-chat-toggle" onclick="toggleChat()" title="AI แนะนำหนัง">
        <i class="bi bi-robot"></i>
    </button>

    <!-- Chat Window -->
    <div id="ai-chat-window" style="display:none;">
        <div id="ai-chat-header">
            <span><i class="bi bi-robot me-2"></i>AI แนะนำหนัง</span>
            <button onclick="toggleChat()" class="btn-close btn-close-white btn-sm"></button>
        </div>
        <div id="ai-chat-messages">
            <div class="ai-msg">
                <div class="msg-bubble ai">
                    สวัสดีครับ! 🎬 บอกแนวหนังที่ชอบมาได้เลย เช่น "อยากดูหนังสยองขวัญ" หรือ "หนังตลกเกาหลี"
                </div>
            </div>
        </div>
        <div id="ai-chat-input">
            <input type="text" id="ai-msg-input" placeholder="พิมพ์แนวหนังที่ชอบ..." autocomplete="off">
            <button onclick="sendAiMessage()" id="ai-send-btn">
                <i class="bi bi-send-fill"></i>
            </button>
        </div>
    </div>
</div>

<style>
    #ai-chat-widget {
        position: fixed;
        bottom: 24px;
        right: 24px;
        z-index: 9999;
        font-family: 'Segoe UI', Tahoma, sans-serif;
    }

    #ai-chat-toggle {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        border: none;
        background: linear-gradient(135deg, #b71c1c, #ff5252);
        color: #fff;
        font-size: 1.6rem;
        box-shadow: 0 6px 25px rgba(183, 28, 28, .4);
        cursor: pointer;
        transition: all .3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    #ai-chat-toggle:hover {
        transform: scale(1.1);
        box-shadow: 0 8px 30px rgba(183, 28, 28, .6);
    }

    #ai-chat-window {
        position: absolute;
        bottom: 75px;
        right: 0;
        width: 360px;
        max-width: 90vw;
        background: #1b1b1b;
        border: 1px solid #333;
        border-radius: 16px;
        box-shadow: 0 15px 50px rgba(0, 0, 0, .5);
        overflow: hidden;
        animation: chatSlideUp .3s ease;
    }

    @keyframes chatSlideUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    #ai-chat-header {
        background: linear-gradient(135deg, #b71c1c, #d32f2f);
        color: #fff;
        padding: 14px 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: 600;
        font-size: .95rem;
    }

    #ai-chat-messages {
        height: 320px;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    #ai-chat-messages::-webkit-scrollbar {
        width: 4px;
    }

    #ai-chat-messages::-webkit-scrollbar-thumb {
        background: #444;
        border-radius: 4px;
    }

    .msg-bubble {
        max-width: 85%;
        padding: 10px 14px;
        border-radius: 14px;
        font-size: .9rem;
        line-height: 1.5;
        word-wrap: break-word;
    }

    .msg-bubble.ai {
        background: #2a2a2a;
        color: #eee;
        align-self: flex-start;
        border-bottom-left-radius: 4px;
    }

    .msg-bubble.user {
        background: #b71c1c;
        color: #fff;
        align-self: flex-end;
        border-bottom-right-radius: 4px;
        margin-left: auto;
    }

    .ai-msg {
        display: flex;
    }

    .user-msg {
        display: flex;
        justify-content: flex-end;
    }

    .typing-dots {
        display: inline-flex;
        gap: 4px;
        padding: 8px 14px;
    }

    .typing-dots span {
        width: 8px;
        height: 8px;
        background: #888;
        border-radius: 50%;
        animation: dotPulse 1.4s ease-in-out infinite;
    }

    .typing-dots span:nth-child(2) {
        animation-delay: .2s;
    }

    .typing-dots span:nth-child(3) {
        animation-delay: .4s;
    }

    @keyframes dotPulse {

        0%,
        60%,
        100% {
            transform: scale(.6);
            opacity: .4;
        }

        30% {
            transform: scale(1);
            opacity: 1;
        }
    }

    #ai-chat-input {
        display: flex;
        border-top: 1px solid #333;
        padding: 10px;
        gap: 8px;
        background: #111;
    }

    #ai-msg-input {
        flex: 1;
        background: #2a2a2a;
        color: #fff;
        border: 1px solid #444;
        border-radius: 24px;
        padding: 8px 16px;
        outline: none;
        font-size: .9rem;
        transition: border-color .2s;
    }

    #ai-msg-input:focus {
        border-color: #b71c1c;
    }

    #ai-msg-input::placeholder {
        color: #777;
    }

    #ai-send-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: none;
        background: #b71c1c;
        color: #fff;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background .2s;
        flex-shrink: 0;
    }

    #ai-send-btn:hover {
        background: #d32f2f;
    }

    /* Movie recommendation card inside chat */
    .rec-card {
        background: #222;
        border: 1px solid #383838;
        border-radius: 10px;
        padding: 10px 12px;
        margin-top: 8px;
    }

    .rec-card a {
        color: #ff5252;
        text-decoration: none;
        font-weight: 600;
    }

    .rec-card a:hover {
        text-decoration: underline;
    }
</style>
