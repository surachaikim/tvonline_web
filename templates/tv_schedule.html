<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตารางรายการทีวีวันนี้ - TVHUB.ONLINE</title>
    <meta name="description" content="ตารางรายการทีวีออนไลน์วันนี้และพรุ่งนี้ ช่อง 3 ช่อง 7 MCOT Thai PBS ONE31 GMM25">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --brand-red: #b71c1c;
        }

        body {
            background: #111;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .hero-section {
            background: linear-gradient(135deg, #000 55%, var(--brand-red) 100%);
            padding: 3rem 0;
            text-align: center;
            border-bottom-left-radius: 2rem;
            border-bottom-right-radius: 2rem;
        }

        .channel-tab {
            background: #1e1e1e;
            color: #fff;
            border-radius: 50px;
            margin: 0 4px 8px;
            font-weight: 500;
            transition: all .3s;
        }

        .channel-tab.active {
            background: var(--brand-red);
            box-shadow: 0 4px 15px rgba(183, 28, 28, .35);
        }

        .program-row {
            background: #1b1b1b;
            border: 1px solid #2a2a2a;
            border-radius: .75rem;
            padding: 1rem;
            margin-bottom: .5rem;
            transition: all .2s;
        }

        .program-row:hover {
            border-color: var(--brand-red);
            transform: translateX(4px);
        }

        .program-time {
            font-weight: 700;
            color: var(--brand-red);
            min-width: 60px;
        }

        .type-badge {
            font-size: .75rem;
            border-radius: 50px;
        }

        .type-badge.ข่าว {
            background: #1565c0;
        }

        .type-badge.ละคร {
            background: #ad1457;
        }

        .type-badge.วาไรตี้ {
            background: #f57f17;
            color: #000;
        }

        .type-badge.กีฬา {
            background: #2e7d32;
        }

        .type-badge.สารคดี {
            background: #4527a0;
        }

        .day-btn.active {
            background: var(--brand-red) !important;
            border-color: var(--brand-red) !important;
        }

        footer {
            margin-top: auto !important;
        }
    </style>
</head>

<body>
    {% include 'includes/header.html' %}

    <main style="flex: 1 0 auto;">
        <div class="hero-section mb-4">
            <div class="container">
                <h1 class="fw-bold"><i class="bi bi-calendar3 me-2"></i>ตารางรายการทีวี</h1>
                <p class="text-white-50 mb-3">ตารางรายการช่องดัง อัปเดตทุกวันโดย AI</p>
                <div class="btn-group">
                    <button class="btn btn-outline-light day-btn active" onclick="loadSchedule('today', this)">📅
                        วันนี้</button>
                    <button class="btn btn-outline-light day-btn" onclick="loadSchedule('tomorrow', this)">📆
                        พรุ่งนี้</button>
                </div>
            </div>
        </div>

        <div class="container mb-5">
            <!-- Loading -->
            <div id="loading" class="text-center my-5">
                <div class="spinner-border text-danger mb-3" role="status"></div>
                <div class="fw-semibold">กำลังสร้างตารางรายการ...</div>
                <div class="text-muted small">AI กำลังจัดตาราง โปรดรอสักครู่</div>
            </div>

            <!-- Error -->
            <div id="error" class="alert alert-danger d-none" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <span id="error-text">ไม่สามารถโหลดตารางได้</span>
            </div>

            <!-- Content -->
            <div id="content" class="d-none">
                <ul class="nav nav-pills justify-content-center flex-wrap mb-4" id="channel-tabs"></ul>
                <div class="tab-content" id="channel-tab-content"></div>
            </div>
        </div>
    </main>

    {% include 'includes/footer.html' %}

    <script>
        var currentDay = 'today';

        function loadSchedule(day, btn) {
            currentDay = day;
            // Update active button
            document.querySelectorAll('.day-btn').forEach(function (b) { b.classList.remove('active'); });
            if (btn) btn.classList.add('active');

            var loading = document.getElementById('loading');
            var error = document.getElementById('error');
            var content = document.getElementById('content');
            loading.classList.remove('d-none');
            error.classList.add('d-none');
            content.classList.add('d-none');

            fetch('/api/tv-schedule?day=' + day)
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    if (data.error) throw new Error(data.error);
                    renderSchedule(data);
                    loading.classList.add('d-none');
                    content.classList.remove('d-none');
                })
                .catch(function (err) {
                    loading.classList.add('d-none');
                    document.getElementById('error-text').textContent = err.message || 'เกิดข้อผิดพลาด';
                    error.classList.remove('d-none');
                });
        }

        function renderSchedule(data) {
            var tabs = document.getElementById('channel-tabs');
            var tabContent = document.getElementById('channel-tab-content');
            tabs.innerHTML = '';
            tabContent.innerHTML = '';

            var channels = data.channels || [];
            channels.forEach(function (ch, i) {
                var id = 'ch-' + i;
                var active = i === 0 ? 'active' : '';

                // Tab
                var li = document.createElement('li');
                li.className = 'nav-item';
                li.innerHTML = '<button class="nav-link channel-tab ' + active + '" id="' + id + '-tab" data-bs-toggle="tab" data-bs-target="#' + id + '" type="button">' + ch.name + '</button>';
                tabs.appendChild(li);

                // Pane
                var pane = document.createElement('div');
                pane.className = 'tab-pane fade ' + (i === 0 ? 'show active' : '');
                pane.id = id;

                var html = '';
                (ch.programs || []).forEach(function (p) {
                    var typeClass = p.type || '';
                    html += '<div class="program-row d-flex align-items-center">';
                    html += '<span class="program-time me-3">' + (p.time || '') + '</span>';
                    html += '<span class="flex-grow-1">' + (p.title || '') + '</span>';
                    if (p.type) html += '<span class="badge type-badge ' + typeClass + '">' + p.type + '</span>';
                    html += '</div>';
                });
                pane.innerHTML = html;
                tabContent.appendChild(pane);
            });
        }

        // Initial load
        loadSchedule('today', document.querySelector('.day-btn'));
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
